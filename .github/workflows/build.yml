name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller dnspython PySocks

      - name: Build EXE
        run: pyinstaller DirectMailer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectMailer
          path: dist/DirectMailer.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DirectMailer.exe
          generate_release_notes: true
